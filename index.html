<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CYBER_DASH // v2.077_PHANTOM</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0c10">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230b0c10%22 rx=%2220%22/><text x=%2250%22 y=%2265%22 font-family=%22monospace%22 font-size=%2250%22 fill=%22%2300ffcc%22 text-anchor=%22middle%22 font-weight=%22bold%22>%3E_</text></svg>">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0b0c10;
      color: #00ffcc;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      height: 100vh;
      padding: 15px;
    }

    body.shaking {
      animation: screen-shake 0.3s linear;
    }

    /* CRT Scanline Overlay */
    .scanlines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 6px 100%;
      z-index: 90;
      pointer-events: none;
    }

    /* --- MECHANICAL SHUTTER STARTUP SCREEN --- */
    #boot-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 100;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .shutter {
      flex: 1;
      background: #121318;
      border: 4px solid #1a1c23;
      position: relative;
      transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
    }

    .shutter-top {
      border-bottom: 2px solid #ff0055;
      transform-origin: top;
    }
    .shutter-top::after {
      content: 'SECURITY_LOCK // ACTIVE';
      position: absolute;
      bottom: 10px; right: 20px;
      font-size: 0.75rem; color: #ff0055; opacity: 0.5;
    }

    .shutter-bottom {
      border-top: 2px solid #ff0055;
      transform-origin: bottom;
    }
    .shutter-bottom::after {
      content: 'SYS_BOOT_SEQUENCE_v2.077';
      position: absolute;
      top: 10px; left: 20px;
      font-size: 0.75rem; color: #00ffcc; opacity: 0.5;
    }

    /* Animated Logo Container */
    .boot-logo-container {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 110;
      text-align: center;
      width: 90%;
      max-width: 500px;
      opacity: 0;
      animation: stamp-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
    }

    .boot-logo {
      width: 100%;
      height: auto;
      /* Inverts black asset to white text, shifts tint to neon corporate hot pink */
      filter: invert(1) sepia(1) saturate(5) hue-rotate(300deg) drop-shadow(0 0 20px #ff0055);
    }

    /* Animation States managed by JS */
    #boot-screen.open .shutter-top { transform: translateY(-100%); }
    #boot-screen.open .shutter-bottom { transform: translateY(100%); }
    #boot-screen.open .boot-logo-container { 
      opacity: 1; 
      transform: translate(-50%, -50%) scale(0.9);
      filter: brightness(2) blur(5px);
      opacity: 0;
      transition: all 0.4s ease-out;
    }

    /* Keyframes */
    @keyframes stamp-in {
      0% { transform: translate(-50%, -50%) scale(4); opacity: 0; filter: invert(1) blur(10px); }
      70% { transform: translate(-50%, -50%) scale(0.95); opacity: 1; filter: invert(1) sepia(1) saturate(5) hue-rotate(300deg) drop-shadow(0 0 30px #ff0055); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    @keyframes screen-shake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-4px, 2px); }
      30% { transform: translate(4px, -2px); }
      50% { transform: translate(-2px, -3px); }
      70% { transform: translate(3px, 3px); }
      90% { transform: translate(-1px, -1px); }
    }
    /* ----------------------------------------- */

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
      position: relative;
      z-index: 20;
    }

    .config-btn {
      background: transparent;
      border: 1px solid #ff0055;
      color: #ff0055;
      font-family: 'Share Tech Mono', monospace;
      padding: 5px 10px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    
    .config-btn:hover { background: rgba(255, 0, 85, 0.2); }

    .matrix-grid {
      display: grid;
      grid-template-columns: 1fr;
      grid-gap: 15px;
      height: calc(100% - 40px);
      z-index: 1;
      position: relative;
    }

    .cyber-panel {
      border: 1px solid #00ffcc;
      background: rgba(11, 12, 16, 0.85);
      box-shadow: 0 0 12px rgba(0, 255, 204, 0.15), inset 0 0 10px rgba(0, 255, 204, 0.1);
      padding: 15px;
      position: relative;
    }

    .cyber-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 10px; height: 10px;
      border-top: 2px solid #ff0055;
      border-left: 2px solid #ff0055;
    }

    .panel-header {
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: #ff0055;
      margin-bottom: 12px;
      border-bottom: 1px solid #ff0055;
      padding-bottom: 4px;
      text-transform: uppercase;
    }

    .progress-container {
      border: 1px solid #ff0055;
      height: 32px;
      position: relative;
      background: rgba(255, 0, 85, 0.05);
      overflow: hidden;
    }

    .progress-fill {
      background: repeating-linear-gradient(45deg, #ff0055, #ff0055 10px, #cc0044 10px, #cc0044 20px);
      height: 100%;
      width: 0%;
      box-shadow: 0 0 10px #ff0055;
      transition: width 0.5s ease;
    }

    #progress-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-weight: bold;
      text-shadow: 1px 1px 2px #000;
    }

    .glitch { animation: glitch-skew 1s infinite linear alternate-reverse; }
    @keyframes glitch-skew {
      0% { transform: skew(0deg); }
      20% { transform: skew(-2deg); }
      40% { transform: skew(2deg); }
      60% { transform: skew(-1deg); }
      80% { transform: skew(1deg); }
      100% { transform: skew(0deg); }
    }

    /* Modal Overlay styling */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 50;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(3px);
    }

    .modal-content {
      background: #0b0c10;
      border: 1px solid #00ffcc;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
      padding: 20px;
      width: 90%;
      max-width: 400px;
      position: relative;
    }

    .modal-content label { display: block; margin-top: 15px; color: #00ffcc; font-size: 0.9rem; }
    .modal-content input {
      width: 100%; padding: 10px; margin-top: 5px;
      background: rgba(0, 255, 204, 0.05); border: 1px solid #ff0055; color: #fff;
      font-family: 'Share Tech Mono', monospace; font-size: 1.1rem;
    }
    .modal-content input:focus { outline: none; box-shadow: 0 0 8px rgba(255, 0, 85, 0.5); }
    
    .modal-buttons { margin-top: 25px; display: flex; justify-content: flex-end; gap: 15px; }
  </style>
</head>
<body>

    <div class="boot-logo-container">

        <button class="config-btn" id="btn-save-config">COMMIT DATA</button>
      </div>
    </div>
  </div>

  <script>
    console.log("%c WAKE UP, SAMURAI. WE HAVE A FRESHDESK TICKET TO BURN.", "color: #ff0055; font-size: 16px; font-weight: bold; font-family: monospace;");

    const CyberDash = {
      config: {
        lat: 52.4555,

      },
      
      dictionary: {

      init() {

        this.fetchWeather();

        this.loadDictionary().then(() => {
          this.generateCorruptedLog();
          setInterval(() => this.generateCorruptedLog(), 12000); 
        });
      },

      runBootSequence() {
        const bootScreen = document.getElementById('boot-screen');
        
        // Shutter impact / Screen shake handles the heavy slam timing
        setTimeout(() => {
          document.body.classList.add('shaking');
          setTimeout(() => document.body.classList.remove('shaking'), 300);
        }, 800);

        // Splitting shutters
