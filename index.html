<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER_DASH // SYSTEM_ACTIVE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d0e15;
      color: #00ffcc;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      height: 100vh;
      padding: 15px;
    }

    /* CRT Scanline Overlay */
    .scanlines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 6px 100%;
      z-index: 10;
      pointer-events: none;
    }

    .matrix-grid {
      display: grid;
      grid-template-columns: 1fr;
      grid-gap: 15px;
      height: 100%;
      z-index: 1;
      position: relative;
    }

    .cyber-panel {
      border: 1px solid #00ffcc;
      background: rgba(13, 14, 21, 0.85);
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.2), inset 0 0 10px rgba(0, 255, 204, 0.1);
      padding: 15px;
      position: relative;
    }

    .panel-header {
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: #ff0055;
      margin-bottom: 10px;
      border-bottom: 1px solid #ff0055;
      padding-bottom: 3px;
    }

    .progress-container {
      border: 1px solid #ff0055;
      height: 30px;
      position: relative;
      background: rgba(255, 0, 85, 0.05);
    }

    .progress-fill {
      background: #ff0055;
      height: 100%;
      width: 0%;
      box-shadow: 0 0 8px #ff0055;
      transition: width 0.5s ease;
    }

    #progress-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-weight: bold;
    }

    .transit-item {
      display: flex; 
      justify-content: space-between; 
      font-size: 1.1rem; 
      margin-bottom: 8px; 
      border-bottom: 1px dashed rgba(0, 255, 204, 0.15); 
      padding-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  
  <div class="matrix-grid">
    <section class="cyber-panel">
      <div class="panel-header">SYSTEM_TIME // COUNTDOWN_UNTIL_EXIT</div>
      <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <div id="clock" style="font-size: 3rem; text-shadow: 0 0 10px #00ffcc; color: #00ffcc;">00:00</div>
        <div id="time-left" style="font-size: 1.5rem; color: #ff0055; text-shadow: 0 0 8px #ff0055; font-weight: bold;">T-MINUS: --:--</div>
      </div>
    </section>

    <section class="cyber-panel">
      <div class="panel-header">SHIFT_DRAIN_RATIO</div>
      <div class="progress-container">
        <div id="progress-bar" class="progress-fill"></div>
        <div id="progress-text">0.0%</div>
      </div>
    </section>

    <section class="cyber-panel">
      <div class="panel-header">ENV_METRICS (LOCAL)</div>
      <div id="weather">CONNECTING TO SENSORS...</div>
    </section>

    <section class="cyber-panel">
      <div class="panel-header">EXTRACTION_VECTOR // DEPARTURES</div>
      <div id="bus-board">
        <div style="color: rgba(0,255,204,0.6);">INITIALIZING DATA FEEDS...</div>
      </div>
    </section>
  </div>

  <script>
    // ==========================================
    // SYSTEM CONFIGURATION
    // ==========================================
    const CONFIG = {
      lat: 52.4555,
      lon: -1.7289,
      busStopId: "43000170202",
      shiftStartHour: 7,
      shiftStartMin: 30,
      shiftEndHour: 16,
      shiftEndMin: 0
    };

    // ==========================================
    // MODULE: CHRONOMETER & SHIFT PROGRESS
    // ==========================================
    function updateChronometer() {
      const now = new Date();
      
      // Update Main Clock
      document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
      
      // Calculate Shift Boundaries
      const start = new Date();
      start.setHours(CONFIG.shiftStartHour, CONFIG.shiftStartMin, 0, 0);
      
      const end = new Date();
      end.setHours(CONFIG.shiftEndHour, CONFIG.shiftEndMin, 0, 0);
      
      let percentage = 0;
      let countdownText = "";
      
      if (now > end) {
        percentage = 100;
        countdownText = "SYS_CLEAR // 00:00:00";
      } else if (now >= start) {
        const totalDuration = end - start;
        const elapsed = now - start;
        percentage = (elapsed / totalDuration) * 100;
        
        const diffMs = end - now;
        const hrs = String(Math.floor(diffMs / 3600000)).padStart(2, '0');
        const mins = String(Math.floor((diffMs % 3600000) / 60000)).padStart(2, '0');
        const secs = String(Math.floor((diffMs % 60000) / 1000)).padStart(2, '0');
        countdownText = `T-MINUS: ${hrs}:${mins}:${secs}`;
      } else {
        countdownText = "AWAITING_SHIFT_START";
      }
      
      // Update UI
      document.getElementById('time-left').innerText = countdownText;
      const cleanPct = percentage.toFixed(2);
      document.getElementById('progress-bar').style.width = `${cleanPct}%`;
      document.getElementById('progress-text').innerText = `${cleanPct}%`;
    }

    // ==========================================
    // MODULE: ATMOSPHERICS (OPEN-METEO)
    // ==========================================
    async function fetchWeather() {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.lat}&longitude=${CONFIG.lon}&current=temperature_2m,relative_humidity_2m,weather_code`;
        const response = await fetch(url);
        if (!response.ok) throw new Error("API Offline");
        
        const data = await response.json();
        const temp = Math.round(data.current.temperature_2m);
        
        const codeMap = {
          0: "CLEAR SKY", 1: "MAINLY CLEAR", 2: "PARTLY CLOUDY", 3: "OVERCAST",
          45: "FOGGY", 51: "LIGHT DRIZZLE", 61: "SLIGHT RAIN", 63: "MODERATE RAIN"
        };
        const condition = codeMap[data.current.weather_code] || "MATRIX ACTIVE";
        
        document.getElementById('weather').innerHTML = `
          <div style="font-size: 1.8rem; color: #00ffcc; font-weight: bold; text-shadow: 0 0 8px #00ffcc;">${temp}°C // ${condition}</div>
          <div style="font-size: 0.8rem; color: rgba(0, 255, 204, 0.6); margin-top: 4px;">HUMIDITY: ${data.current.relative_humidity_2m}%</div>
        `;
      } catch (error) {
        document.getElementById('weather').innerHTML = `<span style="color: #ff0055;">WEATHER_FAULT</span>`;
      }
    }

    // ==========================================
    // MODULE: TRANSIT EXTRACTION (TRANSPORTAPI)
    // ==========================================
    async function fetchTransit() {
      const APP_ID = "6724b89c"; 
      const APP_KEY = "5c7fa551b200f4a830f5ae85";
      
      try {
        const url = `https://transportapi.com/v3/uk/bus/stop/${CONFIG.busStopId}/live.json?app_id=${APP_ID}&app_key=${APP_KEY}&group=no&nextbuses=no`;
        
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP_${response.status}`);
        
        const data = await response.json();
        const allBuses = data.departures.all || [];
        let htmlOutput = "";
        
        if (allBuses.length === 0) {
          htmlOutput = `<div style="color: rgba(0, 255, 204, 0.4);">NO VECTORS SCHEDULED</div>`;
        } else {
          // Process the next 4 buses
          allBuses.slice(0, 4).forEach(bus => {
            const line = bus.line;
            const dest = bus.direction.toUpperCase();
            let statusText = bus.aimed_departure_time || "SCHED";
            
            if (bus.best_departure_estimate) {
              const [hours, minutes] = bus.best_departure_estimate.split(':').map(Number);
              const now = new Date();
              const target = new Date();
              target.setHours(hours, minutes, 0, 0);
              let diffMins = Math.round((target - now) / 60000);
              statusText = diffMins <= 0 ? "DUE" : `${diffMins} MIN`;
            }
            
            htmlOutput += `
              <div class="transit-item">
                <span style="color: #ff0055; font-weight: bold; min-width: 50px;">[${line}]</span>
                <span style="color: #00ffcc; flex-grow: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-right: 10px;">${dest}</span>
                <span style="color: #fff; text-shadow: 0 0 5px #fff; font-weight: bold;">${statusText}</span>
              </div>
            `;
          });
        }
        document.getElementById('bus-board').innerHTML = htmlOutput;
      } catch (error) {
        document.getElementById('bus-board').innerHTML = `<span style="color: #ff0055;">TRANSIT_FAULT // ${error.message}</span>`;
      }
    }

    // ==========================================
    // INITIALIZATION
    // ==========================================
    // Run clock every second
    setInterval(updateChronometer, 1000);
    updateChronometer();

    // Run weather every 15 minutes
    setInterval(fetchWeather, 900000); 
    fetchWeather();

    // Run transit every 60 seconds
    setInterval(fetchTransit, 60000); 
    fetchTransit();
  </script>
</body>
</html>
